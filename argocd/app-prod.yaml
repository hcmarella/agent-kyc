apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-kyc-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hcmarella/Agent-KYC
    targetRevision: main
    path: helm/agent-kyc
    helm:
      valueFiles:
        - ../../environments/prod/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-prod