apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-kyc
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: agent-kyc
  template:
    metadata:
      labels:
        app: agent-kyc
    spec:
      containers:
        - name: agent-kyc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - configMapRef:
                name: agent-kyc-config
            - secretRef:
                name: agent-kyc-secret
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.service.targetPort }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 15