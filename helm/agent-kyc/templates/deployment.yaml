apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-kyc-agent
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: agent-kyc
  template:
    metadata:
      labels:
        app: agent-kyc
    spec:
      containers:
        - name: agent-kyc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: ENV_NAME
              value: {{ .Values.env.ENV_NAME }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
