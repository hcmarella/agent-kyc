name: Agent KYC DEV CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: agent-kyc

jobs:
  test-build-push-dev:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -q

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tag
        run: |
          echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "IMAGE_TAG=dev-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:dev

      - name: Update DEV Helm values
        run: |
          sed -i "s|repository:.*|repository: ghcr.io/${IMAGE_OWNER}/${IMAGE_NAME}|g" environments/dev/values.yaml
          sed -i "s|tag:.*|tag: ${IMAGE_TAG}|g" environments/dev/values.yaml
          sed -i "s|pullPolicy:.*|pullPolicy: Always|g" environments/dev/values.yaml

      - name: Commit DEV deployment tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add environments/dev/values.yaml
          git commit -m "Deploy ${IMAGE_TAG} to DEV" || echo "No changes to commit"
          git push
